<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search Engine</title>
    <style>
        /* CSS for Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-top: 50px; color: #333; }

        #search-form {
            width: 90%;
            max-width: 600px;
            display: flex;
            margin-top: 20px;
        }

        #search-box {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
            outline: none;
            font-size: 16px;
        }

        #search-form button {
            padding: 15px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-size: 16px;
        }

        #image-container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        #image-container img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        #image-container img:hover {
            transform: scale(1.05);
        }

        #show-more-btn {
            margin: 20px 0 50px;
            padding: 10px 30px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Image Search Website</h1>
    
    <form id="search-form">
        <input type="text" id="search-box" placeholder="Search anything (e.g. Nature, Cars)...">
        <button type="submit">Search</button>
    </form>

    <div id="image-container"></div>
    <button id="show-more-btn">Show More</button>

    <script>
        // JavaScript logic
        const accessKey = "7v_T3r2JidVv16mU3YlS_D_9_H9zH6z9R_z_yQ4z4E0"; // Public demo key
        const searchForm = document.getElementById("search-form");
        const searchBox = document.getElementById("search-box");
        const imageContainer = document.getElementById("image-container");
        const showMoreBtn = document.getElementById("show-more-btn");

        let keyword = "";
        let page = 1;

        async function searchImages() {
            keyword = searchBox.value;
            const url = `https://api.unsplash.com/search/photos?page=${page}&query=${keyword}&client_id=RZEIOVfPhS7vM9a7u_2m5LbCm6Gv-9A6BAn5mKst_n0&per_page=12`;

            const response = await fetch(url);
            const data = await response.json();

            if(page === 1){
                imageContainer.innerHTML = "";
            }

            const results = data.results;

            results.map((result) => {
                const image = document.createElement("img");
                image.src = result.urls.small;
                const imageLink = document.createElement("a");
                imageLink.href = result.links.html;
                imageLink.target = "_blank";

                imageLink.appendChild(image);
                imageContainer.appendChild(imageLink);
            });

            showMoreBtn.style.display = "block";
        }

        searchForm.addEventListener("submit", (e) => {
            e.preventDefault();
            page = 1;
            searchImages();
        });

        showMoreBtn.addEventListener("click", () => {
            page++;
            searchImages();
        });
    </script>
</body>
</html>
